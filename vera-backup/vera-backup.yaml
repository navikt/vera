apiVersion: nais.io/v1
kind: Naisjob
metadata:
  labels:
    team: team-atom
  name: vera-backup
  namespace: team-atom
spec:
  activeDeadlineSeconds: 6000
  backoffLimit: 5
  failedJobsHistoryLimit: 2
  gcp:
    buckets:
      - cascadingDelete: false
        name: vera-backup-bckt
        retentionPeriodDays: 30
  image: "{{ image }}"
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 64Mi
  restartPolicy: Never
  schedule: '0 */6 * * *'
  skipCaBundle: true
  successfulJobsHistoryLimit: 2
  ttlSecondsAfterFinished: 60
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  labels:
    app: vera-backup
    team: team-atom
  name: vera-backup-apiserver
  namespace: team-atom
spec:
  egress:
  - to:
    - ipBlock:
        cidr: 172.16.3.2/32
  podSelector:
    matchLabels:
      app: vera-backup
  policyTypes:
  - Egress
