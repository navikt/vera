---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vera-backup
  namespace: team-atom
rules:
  - apiGroups: [ "" ]
    resources: [ "pods/exec", "pods" ]
    verbs: [ "create", "get" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vera-backup
  namespace: team-atom
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vera-backup
subjects:
- namespace: team-atom
  kind: ServiceAccount
  name: vera-backup
